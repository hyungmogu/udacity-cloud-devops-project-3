version: 2.1

orbs:
  slack: circleci/slack@4.12.0

commands:
    notify_slack_error:
        steps:
            - slack/notify:
                event: fail
                template: basic_fail_1

    notify_slack_pass:
        steps:
            - slack/notify:
                event: pass
                template: basic_success_1
    
    destroy_environment:
        description: Destroy back-end and front-end cloudformation stacks given a workflow ID.  
        steps:
            - run:
                name: Destroy environments
                when: on_fail
                command: |
                    aws cloudformation delete-stack --stack-name udapeople-backend-${CIRCLE_WORKFLOW_ID:0:7}
                    aws cloudformation delete-stack --stack-name udapeople-frontend-${CIRCLE_WORKFLOW_ID:0:7}
    
    revert-migrations:
        description: Revert the last migration if successfully run in the current workflow.
        steps:
            - run:
                name: Revert migrations
                # Add when this will run
                when: on_fail
                command: |
                    # Curl command here to see if there was a successful migration associated with the workflow id, store result in SUCCESS variable
                    SUCCESS=$(curl --insecure https://kvdb.io/AuvzAMdBDUPChm834ZXDCt/migration_${CIRCLE_WORKFLOW_ID:0:7});
                    echo $SUCCESS;
                    if(( $SUCCESS==1 )); 
                    then
                        cd ~/project/backend;
                        npm install;
                        #  Add revert code here. You can find this in the Getting Started section.
                        npm run migrations:revert
                    fi

jobs:
    build-frontend:
        docker:
            - image: circleci/node:13.8.0
        steps:
            - checkout
            - restore_cache:
                keys: [frontend-build]
            - run:
                name: Build front-end
                command: |
                    # Your code here
                    cd frontend
                    npm install
                    npm run build
            - save_cache:
                paths: [frontend/node_modules]
                key: frontend-build
            - notify_slack_error
            - notify_slack_pass

    build-backend:
        docker:
            - image: circleci/node:13.8.0
        steps:
            - checkout
            - restore_cache:
                keys: [backend-build]
            - run:
                name: Back-end build
                command: |
                    # Your code here
                    cd backend
                    npm install
                    npm run build
            - save_cache:
                paths: [backend/node_modules]
                key: backend-build
            - notify_slack_error
            - notify_slack_pass

    test-frontend:
        docker:
            - image: circleci/node:13.8.0
        steps:
            # Checkout code from git
            - checkout
            # Restore from cache
            - restore_cache:
                keys: [frontend-build]
            # Your job code here
            - run:
                name: Run frontend test
                command: |
                    # Your code here
                    cd frontend
                    npm install
                    npm run test
            - notify_slack_error
            - notify_slack_pass

    test-backend:
        docker:
            # Docker image here
            - image: circleci/node:13.8.0
        steps:
            # Checkout code from git
            - checkout
            # Restore from cache
            - restore_cache:
                keys: [backend-build]
            # Your job code here
            - run:
                name: Run backend test
                command: |
                    # Your code here
                    cd backend
                    npm install
                    npm run test
            - notify_slack_error
            - notify_slack_pass

    scan-frontend:
        docker:
            # Docker image here
            - image: circleci/node:13.8.0
        steps:
            # Checkout code from git
            - checkout
            # Restore from cache
            - restore_cache:
                keys: [frontend-build]
            - run:
                name: Run frontend scan
                command: |
                    # Your job code here
                    cd frontend
                    npm install
                    npm audit fix --audit-level=critical --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit fix --force
                    npm audit --audit-level=critical
            - notify_slack_error
            - notify_slack_pass

    scan-backend:
        docker:
            # Docker image here
            - image: circleci/node:13.8.0
        steps:
            # Checkout code from git
            - checkout
            # Restore from cache
            - restore_cache:
                keys: [backend-build]
            - run:
                name: Run backend scan
                command: |
                    # Your job code here
                    cd backend
                    npm install
                    npm audit fix --audit-level=critical --force
                    npm audit fix --force
                    npm audit --audit-level=critical
            - notify_slack_error
            - notify_slack_pass
            
    deploy-infrastructure:
        docker:
            # Docker image here
            - image: amazon/aws-cli
        steps:
            - checkout
            - run:
                name: Install tar and gzip
                command: |
                    yum -y install tar gzip
            - run:
                name: Ensure backend infrastructure exist
                command: |
                    aws cloudformation deploy \
                    --template-file .circleci/files/backend.yml \
                    --stack-name "udapeople-backend-${CIRCLE_WORKFLOW_ID:0:7}" \
                    --parameter-overrides ID="${CIRCLE_WORKFLOW_ID:0:7}"  \
                    --tags project=udapeople
            
            - run:
                name: Ensure frontend infrastructure exist
                command: |
                    aws cloudformation deploy \
                    --template-file .circleci/files/frontend.yml \
                    --stack-name "udapeople-frontend-${CIRCLE_WORKFLOW_ID:0:7}" \
                    --parameter-overrides ID="${CIRCLE_WORKFLOW_ID:0:7}"  \
                    --tags project=udapeople
            - destroy_environment
            
    configure-infrastructure:
        docker:
            # Docker image here
            - image: python:3.7-alpine3.11
        steps:
            - checkout
            - add_ssh_keys:
                # You can get this ID in the section where you registered the SSH Key
                fingerprints: ["f2:09:6e:3a:0b:55:6f:82:9a:5a:f1:18:8c:c4:82:61"] 
            - run:
                name: Install Ansible
                command: |
                    # Install Ansible
                    apk add --no-cache ansible
            - run:
                name: Run Playbook and Configure server
                command: |
                    # Your command
                    cd .circleci/ansible
                    export ANSIBLE_HOST_KEY_CHECKING=False
                    ansible-playbook -i inventory.txt configure-server.yml
    run-migrations:
        docker:
            # Docker image here that supports NodeJS
            - image: circleci/node:13.8.0
        steps:
            # Checkout code from git
            - checkout
            - run:
                name: Run migrations
                command: |
                    # Your code here
                    cd backend
                    npm install
                    npm run migrations > migrations_dump.txt
            - run:
                name: Send migration results to memstash
                command: |
                    # Your code here
                    if grep -q "has been executed successfully." ~/project/backend/migrations_dump.txt
                    then
                        # If you are using memstash.io, generate the token "7933fe63-4687-4fa1-8426-aa25aa1730ec" on the website
                        # curl -H "Content-Type: text/plain" -H "token: 7933fe63-4687-4fa1-8426-aa25aa1730ec" --request PUT --data "1" https://api.memstash.io/values/migration_${CIRCLE_WORKFLOW_ID:0:7}
                        # If you are using kvdb.io, generate the bucket ID "9GE4jRtKznmVKRfvdBABBe" in your local terminal first
                        curl https://kvdb.io/AuvzAMdBDUPChm834ZXDCt/migration_${CIRCLE_WORKFLOW_ID:0:7}  -d '1'
                    fi
            # Here's where you will add some code to rollback on failure 
            - revert-migrations


workflows:
    default:
        jobs:
            - build-frontend
            - build-backend
            - test-frontend:
                requires: [build-frontend]
            - test-backend:
                requires: [build-backend]
            - scan-frontend:
                requires: [build-frontend]
            - scan-backend:
                requires: [build-backend]
            - deploy-infrastructure:
                requires: [test-frontend, test-backend, scan-frontend, scan-backend]
                filters:
                    branches:
                        only: [test-feature-branch]
            - configure-infrastructure:
                requires: [deploy-infrastructure]
            - run-migrations:
                requires: [configure-infrastructure]
        