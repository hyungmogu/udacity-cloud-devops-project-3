version: 2.1

orbs:
  slack: circleci/slack@4.12.0

commands:
    notify_slack_error:
        steps:
            - slack/notify:
                event: fail
                template: basic_fail_1

    notify_slack_pass:
        steps:
            - slack/notify:
                event: pass
                template: basic_success_1


jobs:
    build-frontend:
        docker:
            - image: circleci/node:13.8.0
        steps:
            - checkout
            - restore_cache:
                keys: [frontend-build]
            - run:
                name: Build front-end
                command: |
                    # Your code here
                    cd frontend
                    npm install
                    npm run build
            - save_cache:
                paths: [frontend/node_modules]
                key: frontend-build
            - notify_slack_error
            - notify_slack_pass

    build-backend:
        docker:
            - image: circleci/node:13.8.0
        steps:
            - checkout
            - restore_cache:
                keys: [backend-build]
            - run:
                name: Back-end build
                command: |
                    # Your code here
                    cd backend
                    npm install
                    npm run build
            - save_cache:
                paths: [backend/node_modules]
                key: backend-build
            - notify_slack_error
            - notify_slack_pass

    test-frontend:
        docker:
            - image: circleci/node:13.8.0
        steps:
            # Checkout code from git
            - checkout
            # Restore from cache
            - restore_cache:
                keys: [frontend-build]
            # Your job code here
            - run:
                name: Run frontend test
                command: |
                    # Your code here
                    cd frontend
                    npm install
                    npm run test
            - notify_slack_error
            - notify_slack_pass

    test-backend:
        docker:
            # Docker image here
            - image: circleci/node:13.8.0
        steps:
            # Checkout code from git
            - checkout
            # Restore from cache
            - restore_cache:
                keys: [backend-build]
            # Your job code here
            - run:
                name: Run backend test
                command: |
                    # Your code here
                    cd backend
                    npm install
                    npm run test
            - notify_slack_error
            - notify_slack_pass

    scan-frontend:
        docker:
            # Docker image here
            - image: circleci/node:13.8.0
        steps:
            # Checkout code from git
            - checkout
            # Restore from cache
            - restore_cache:
                keys: [frontend-build]
            - run:
                name: Run frontend scan
                command: |
                    # Your job code here
                    cd frontend
                    npm install
                    npm audit fix --audit-level=critical --force
                    npm audit --audit-level=critical
            - notify_slack_error
            - notify_slack_pass

    scan-backend:
        docker:
            # Docker image here
            - image: circleci/node:13.8.0
        steps:
            # Checkout code from git
            - checkout
            # Restore from cache
            - restore_cache:
                keys: [backend-build]
            - run:
                name: Run backend scan
                command: |
                    # Your job code here
                    cd backend
                    npm install
                    npm audit fix --audit-level=critical --force
                    npm audit fix --force
                    npm audit --audit-level=critical
            - notify_slack_error
            - notify_slack_pass
            
    deploy-infrastructure:
        docker:
            # Docker image here
            - image: amazon/aws-cli
        steps:
            - checkout
            - run:
                name: Install tar and gzip
                command: |
                    yum -y install tar gzip
            - run:
                name: Ensure backend infrastructure exist
                command: |
                    aws cloudformation deploy \
                    --template-file .circleci/files/backend.yml \
                    --stack-name "udapeople-backend-${CIRCLE_WORKFLOW_ID:0:7}" \
                    --parameter-overrides ID="${CIRCLE_WORKFLOW_ID:0:7}"  \
                    --tags project=udapeople
            - run:
                name: Ensure frontend infrastructure exist
                command: |
                    aws cloudformation deploy \
                    --template-file .circleci/files/frontend.yml \
                    --stack-name "udapeople-frontend-${CIRCLE_WORKFLOW_ID:0:7}" \
                    --parameter-overrides ID="${CIRCLE_WORKFLOW_ID:0:7}"  \
                    --tags project=udapeople

workflows:
    default:
        jobs:
            - build-frontend
            - build-backend
            - test-frontend:
                requires: [build-frontend]
            - test-backend:
                requires: [build-backend]
            - scan-frontend:
                requires: [build-frontend]
            - scan-backend:
                requires: [build-backend]
            - deploy-infrastructure
        